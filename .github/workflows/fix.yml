name: Fix idbloader
on: [push]
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Get rkbin DDR blobs
        run: |
          git clone --depth=1 https://github.com/rockchip-linux/rkbin
          ls rkbin/bin/rk33/
      - uses: actions/upload-artifact@v4
        with:
          name: rkbin-list
          path: rkbin/bin/rk33/
